<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login LMS</title>

    <link rel="stylesheet" href="../CSS/cadastro.css">
</head>
<body>

    <header>
        <h1>Cadastro</h1>
    </header>

    <div class="login-box">

        <p>Escolha o seu estilo de usuário</p>

        <form action="/register" method="POST">

            <label for="user">Escolha o User:</label>

            <select id="user" name="user">
                <option value="Aluno">Aluno</option>
                <option value="ADM">ADM</option>
            </select>


            <label for="nome">Nome:</label>
            <input type="text" id="name" name="name" placeholder="Digite seu nome...">

            <label for="email">Digite o E-mail:</label>
            <input type="text" id="email" name="email" placeholder="Digite seu email..."><br>

            <label for="senha">Crie uma senha:</label>
            <input type="text" id="senha" name="senha" placeholder="Crie uma senha"><br>
            
            <br><br>

            <input type="submit" value="Entrar">

            <div id="mensagem"></div>
        </form>

        <br>

        <a class="links-extras" href="#">Esqueci minha senha</a> | <a class="links-extras" href="/login">Já tem uma conta? Fazer login</a>

    </div>

    <footer>
        <p>Copyright © 2024 LMS. Todos os direitos reservados.</p>
    </footer>
<script>
    form.addEventListener('submit', async (e) => {

    e.preventDefault()

    const formData = new FormData(form)

    const dados = {
        user: formData.get('user'),
        name: formData.get('name'),
        email: formData.get('email'),
        senha: formData.get('senha')
    }

    const response = await fetch('/register', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json'
        },
        body: JSON.stringify(dados)
    })

    const resultado = await response.json()

    const mensagem = document.getElementById('mensagem')

    mensagem.innerHTML = resultado.message

    if(resultado.success){
        mensagem.className = 'sucesso'
        mensagem.style.color = "green"
    } else {
        mensagem.className = 'erro'
        mensagem.style.color = "red"
    }

})
</script>
</body>
</html>
