<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login LMS</title>

    <link rel="stylesheet" href="../CSS/login.css">
</head>
<body>

    <header>
        <h1>Login</h1>
    </header>

    <div class="login-box">

        <form action="/login" method="POST">
            <h2>Faça seu login</h2> <br>
            <label for="email">Digite o E-mail:</label>
            <input type="text" id="email" placeholder="Digite seu email..."><br>

            <label for="senha">Digite sua Senha:</label>
            <input type="text" id="senha" placeholder="Digite sua senha..." required><br><br>

            <input type="submit" value="Entrar">
        </form>

        <br>

        <a class="links-extras" href="#">Esqueci minha senha</a> | <a class="links-extras" href="/cadastro">Não tem uma conta? Criar conta</a>

    </div>

    <footer>
        <p>Copyright © 2024 LMS. Todos os direitos reservados.</p>
    </footer>

</body>
</html>
