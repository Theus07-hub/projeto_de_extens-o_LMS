<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../CSS/ads.css">
</head>
<body>
    <section class="ads-quiz">
        <h2>Quiz</h2>

        <div class="container">
            <div class="quiz-container" id="quiz">
                <div class="quiz-header">
                    <div class="progress">
                        <div class="progress-bar" role="progressbar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
                    </div>
                </div>

                <div id="start-screen" class="start-screen">
                    <p class="start-text">
                        Você está prestes a iniciar o quiz referente a página e o curso! O tempo começa quando você clicar em <b>Começar</b>.
                    </p>
                    <button class="btn btn-primary" id="start-btn">Começar</button>
                </div>

                <div id="question-container" class="question-container" style="display:none;">
                    <p class="question" id="question"></p>
                    <div class="options" id="options"></div>
                </div>

                <div class="quiz-footer" id="quiz-footer" style="display:none;">
                    <div class="timer" id="timer">Time: 30s</div>
                    <button class="btn btn-primary" id="next-btn">Next</button>
                </div>
            </div>
        </div>

    </section>

    <script src="../javascript/quiz_medicina.js"></script>
</body>
</html>
