<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil Marcos</title>
    <link rel="stylesheet" href="../CSS/perfil.css">
</head>
<body>
    <header>
        <h1>Perfil Marcos</h1>
    </header>

    <nav>
        <image src="/public/image/marcos.image.png" alt="Foto do aluno Marcos" class="card-img">
    </nav>

    <table>
        <tr>
            <th>Disciplina</th>
            <th>Nota</th>
            <th>Frequência</th>
        </tr>

        <tr>
            <td>Logistica</td>
            <td><input type="number" min="0" max="10" step="0.1" placeholder="Insira a nota"></td>
            <td><input type="text" placeholder="Insira a frequência"></td>
        </tr>

        <tr>
            <td>Gestão de Estoques</td>
            <td><input type="number" min="0" max="10" step="0.1" placeholder="Insira a nota"></td>
            <td><input type="text" placeholder="Insira a frequência"></td>
        </tr>

        <tr>
            <td>Transporte e Distribuição</td>
            <td><input type="number" min="0" max="10" step="0.1" placeholder="Insira a nota"></td>
            <td><input type="text" placeholder="Insira a frequência"></td>
        </tr>
    </table>
<br><br>

<a href="/quiz_logistica"><button class="btn-quiz">Fazer quiz</button></a>
    <footer>
        <a href="/alunos">Voltar para a lista de alunos</a>
    </footer>

</html>
